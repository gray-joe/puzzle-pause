app = 'daily-puzzle-app'
primary_region = 'lhr'

[build]

[env]
  PUZZLE_ENV = 'prod'
  BASE_URL = 'https://puzzlepause.app'
  DATABASE_URL = 'sqlite:////app/data/puzzle.db'
  CORS_ORIGINS = 'https://puzzlepause.app'
  API_URL = 'http://127.0.0.1:8000'
  PORT = '3000'
  HOSTNAME = '0.0.0.0'
  NODE_ENV = 'production'
  NEXT_TELEMETRY_DISABLED = '1'

[[mounts]]
  source = 'puzzle_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
